<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to CyberSafe Guide</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page-body">

    <div class="split-container">

        <!-- Left Side -->
        <div class="welcome-section">
            <h1>CyberSafe Guide</h1>
            <p>Your friendly introduction to online security.</p>
            <p>Learn to protect yourself in the digital world.</p>
        </div>

        <!-- Right Side -->
        <div class="form-section">

            <!-- LOGIN FORM -->
            <form class="login-form" id="loginForm">
                <h2>Login</h2>

                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>

                <button type="submit" class="button">Login</button>

                <p class="form-footer">
                    Don’t have an account?
                    <span class="register-link" onclick="toggleForm()">Sign Up</span>
                </p>
            </form>

            <!-- SIGNUP FORM -->
            <form class="login-form" id="signupForm" style="display: none;">
                <h2>Sign Up</h2>

                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPassword" placeholder="Password" required>

                <button type="submit" class="button">Create Account</button>

                <p class="form-footer">
                    Already have an account?
                    <span class="register-link" onclick="toggleForm()">Login</span>
                </p>
            </form>

        </div>
    </div>

<script>
const API_URL = "http://127.0.0.1:8000";

// -------- Toggle Login/Signup -------- //
function toggleForm() {
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");

    loginForm.style.display = loginForm.style.display === "none" ? "block" : "none";
    signupForm.style.display = signupForm.style.display === "none" ? "block" : "none";
}

// -------- LOGIN -------- //
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch(`${API_URL}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    // Save session
    localStorage.setItem("user_id", data.user_id);
    localStorage.setItem("username", data.username);

    alert(`Welcome ${data.username}!`);

    // Redirect
    window.location.href = "community.html";
});


// -------- SIGNUP -------- //
document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    const res = await fetch(`${API_URL}/signup`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    alert("Account created! Please login.");
    toggleForm();
});
</script>

</body>
</html>
