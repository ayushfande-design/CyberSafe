<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>

    <header>
        <nav class="main-nav">
            <div class="logo">CyberSafe Guide</div>
            <ul>
                <li><a href="threats.html" class="active">Threats</a></li>
                <li><a href="safety.html">Stay Safe</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="index.html">Logout</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="content-page">
        <h1>Create a Post</h1>

        <form id="postForm">
            <input type="text" id="title" placeholder="Post Title" required>
            <br><br>

            <textarea id="content" placeholder="Describe your experience..." required></textarea>
            <br><br>

            <button type="submit" class="button">Post</button>
        </form>
        <a href="community.html" class="card-link">
            <span class="card-cta">Back to Community</span>
        </a>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        
        // LOGIN CHECK
        if (!localStorage.getItem("user_id")) {
            alert("Please login first");
            window.location.href = "index.html";
        }
        
        document.getElementById("postForm").addEventListener("submit", async (e) => {
            e.preventDefault();
        
            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;
        
            const user_id = localStorage.getItem("user_id");
            const username = localStorage.getItem("username");
        
            await fetch(`${API_URL}/create-post`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    title,
                    content,
                    user_id,
                    username
                })
            });
        
            alert("Post created!");
            window.location.href = "community.html";
        });
        </script>

</body>
</html>
